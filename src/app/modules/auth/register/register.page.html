<ion-content class="ion-padding register-content">
  <div class="register-container">

    <div class="register-header">
      <ion-icon name="wallet" class="logo-icon"></ion-icon>
      <h1>Crear Cuenta</h1>
      <p>Únete a MoneyWise</p>
    </div>

    <form [formGroup]="form">
      <ion-item>
        <ion-label position="floating">Nombre</ion-label>
        <ion-input type="text" formControlName="nombre" placeholder="Tu nombre"></ion-input>
      </ion-item>
      <ion-note color="danger"
        *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched">
        Nombre invalido
      </ion-note>

      <ion-item class="ion-margin-top">
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" formControlName="email" placeholder="tucorreo@email.com"></ion-input>
      </ion-item>
      <ion-note color="danger"
        *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
        Email inválido
      </ion-note>

      <ion-item class="ion-margin-top">
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input type="password" formControlName="password" placeholder="********"></ion-input>
      </ion-item>

      <ion-item class="ion-margin-top">
        <ion-label position="floating">Confirmar Contraseña</ion-label>
        <ion-input type="password" formControlName="confirmar" placeholder="********"></ion-input>
      </ion-item>

      <ion-button
        expand="block"
        class="ion-margin-top"
        (click)="registrar()"
        [disabled]="form.invalid">
        Registrarse
      </ion-button>
    </form>

    <div class="login-link">
      <p>¿Ya tienes cuenta?
        <span (click)="irALogin()">Inicia sesión</span>
      </p>
    </div>

  </div>
</ion-content>
