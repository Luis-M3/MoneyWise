<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="cancelar()">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ modoEdicion ? 'Editar' : 'Nueva' }} Transacción</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="guardar()" [disabled]="form.invalid">
        <ion-icon name="checkmark-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form">

    <!-- Tipo -->
    <div class="form-section">
      <ion-label class="section-label">Tipo de Transacción</ion-label>
      <ion-segment formControlName="tipo">
        <ion-segment-button value="gasto">
          <ion-icon name="arrow-down-circle-outline"></ion-icon>
          <ion-label>Gasto</ion-label>
        </ion-segment-button>
        <ion-segment-button value="ingreso">
          <ion-icon name="arrow-up-circle-outline"></ion-icon>
          <ion-label>Ingreso</ion-label>
        </ion-segment-button>
      </ion-segment>
    </div>

    <!-- Monto -->
    <div class="form-section">
      <ion-label class="section-label">Monto</ion-label>
      <ion-item>
        <ion-icon name="cash-outline" slot="start"></ion-icon>
        <ion-input
          type="number"
          formControlName="monto"
          placeholder="0.00">
        </ion-input>
      </ion-item>
      <ion-note color="danger"
        *ngIf="form.get('monto')?.invalid && form.get('monto')?.touched">
        Ingresa un monto válido mayor a 0
      </ion-note>
    </div>

    <!-- Categoría -->
    <div class="form-section">
      <ion-label class="section-label">Categoría</ion-label>
      <ion-item>
        <ion-icon name="pricetag-outline" slot="start"></ion-icon>
        <ion-select formControlName="categoria" placeholder="Selecciona una categoría">
          <ion-select-option
            *ngFor="let cat of categorias"
            [value]="cat.nombre">
            {{ cat.nombre }}
          </ion-select-option>
        </ion-select>
      </ion-item>
      <ion-note color="danger"
        *ngIf="form.get('categoria')?.invalid && form.get('categoria')?.touched">
        Selecciona una categoría
      </ion-note>
    </div>

    <!-- Fecha -->
    <div class="form-section">
      <ion-label class="section-label">Fecha</ion-label>
      <ion-item>
        <ion-icon name="calendar-outline" slot="start"></ion-icon>
        <ion-datetime
          formControlName="fecha"
          display-format="DD/MM/YYYY"
          presentation="date">
        </ion-datetime>
      </ion-item>
    </div>

    <!-- Descripción -->
    <div class="form-section">
      <ion-label class="section-label">Descripción (opcional)</ion-label>
      <ion-item>
        <ion-icon name="document-text-outline" slot="start"></ion-icon>
        <ion-textarea
          formControlName="descripcion"
          placeholder="Describe esta transacción..."
          rows="3">
        </ion-textarea>
      </ion-item>
    </div>

    <!-- Foto comprobante -->
  <div class="form-section">
    <ion-label class="section-label">Comprobante (opcional)</ion-label>
    <app-photo-selector
      [fotoActual]="fotoActual"
      (onFotoSeleccionada)="fotoActual = $event"
      (onFotoEliminada)="fotoActual = null">
    </app-photo-selector>
  </div>

  </form>

  <!-- Botón Guardar -->
  <ion-button
    expand="block"
    class="save-button"
    (click)="guardar()"
    [disabled]="form.invalid">
    <ion-icon name="save-outline" slot="start"></ion-icon>
    {{ modoEdicion ? 'Actualizar' : 'Guardar' }} Transacción
  </ion-button>

</ion-content>
