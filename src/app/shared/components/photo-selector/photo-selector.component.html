<div class="photo-selector">

  <!-- Vista previa si hay foto -->
  <div class="photo-preview-container" *ngIf="fotoActual">
    <img [src]="fotoActual" alt="Comprobante" class="preview-img"/>
    <div class="photo-overlay">
      <ion-button fill="clear" (click)="tomarFoto()">
        <ion-icon name="camera-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button fill="clear" (click)="seleccionarGaleria()">
        <ion-icon name="images-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button fill="clear" color="danger" (click)="eliminarFoto()">
        <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>
  </div>

  <!-- Botones si no hay foto -->
  <div class="photo-buttons" *ngIf="!fotoActual">
    <div class="photo-placeholder">
      <ion-icon name="image-outline"></ion-icon>
      <span>Agregar comprobante</span>
    </div>
    <div class="buttons-row">
      <ion-button fill="outline" (click)="tomarFoto()">
        <ion-icon name="camera-outline" slot="start"></ion-icon>
        Tomar Foto
      </ion-button>
      <ion-button fill="outline" (click)="seleccionarGaleria()">
        <ion-icon name="images-outline" slot="start"></ion-icon>
        Galería
      </ion-button>
    </div>
  </div>

</div>
