<div class="select-wrapper">
  <ion-item>
    <ion-label position="floating">{{ label }}</ion-label>
    <ion-select [value]="value" (ionChange)="changed($event)">
      <ion-select-option
        *ngFor="let opt of options"
        [value]="opt.valor">
        {{ opt.label }}
      </ion-select-option>
    </ion-select>
  </ion-item>
  <ion-note color="danger" *ngIf="error">{{ error }}</ion-note>
</div>
